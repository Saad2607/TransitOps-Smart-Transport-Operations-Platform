# TransitOps — Render Blueprint
# Role 9: Krish — Live deployment (API + PostgreSQL)
#
# Deploy: connect repo in Render Dashboard → New Blueprint → select this file
# Docs:   https://render.com/docs/blueprint-spec

databases:
  - name: transitops-db
    plan: free
    databaseName: transitops
    user: transitops

services:
  - type: web
    name: transitops-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: transitops-db
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: JWT_ISSUER
        value: transitops-api
      - key: CLIENT_URL
        sync: false
    preDeployCommand: node scripts/run-migrations.js
