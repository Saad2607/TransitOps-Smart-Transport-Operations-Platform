services:
  postgres:
    image: postgres:16-alpine
    container_name: transitops-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transitops
    volumes:
      - transitops_pgdata:/var/lib/postgresql/data

volumes:
  transitops_pgdata:
